openapi: "3.1.0"
info:
  title: Aureon – Alerts & Notifications API
  version: "1.0.0"
  description: Price alert management and in-app notification retrieval.

servers:
  - url: /api/v1

security:
  - BearerAuth: []

paths:
  /alerts:
    get:
      summary: List all alerts for the current user
      operationId: getAlerts
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, TRIGGERED, CANCELLED, ALL]
            default: ALL
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceAlertResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create a new price alert
      operationId: createAlert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertRequest"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlertResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /alerts/{id}:
    delete:
      summary: Permanently delete an alert
      operationId: deleteAlert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Alert deleted
        "404":
          description: Alert not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /alerts/{id}/cancel:
    patch:
      summary: Deactivate (cancel) an alert without deleting it — preserves alert history
      operationId: cancelAlert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Alert status set to CANCELLED; alert record retained
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlertResponse"
        "409":
          description: Alert is already TRIGGERED or CANCELLED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Alert not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications:
    get:
      summary: List in-app notifications for the current user
      operationId: getNotifications
      parameters:
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/{id}/read:
    patch:
      summary: Mark a notification as read
      operationId: markNotificationRead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Marked as read
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    CreateAlertRequest:
      type: object
      required: [symbol, thresholdPrice, currency, direction]
      properties:
        symbol:
          type: string
          example: "XAU/USD"
        thresholdPrice:
          type: number
          format: double
          minimum: 0.000001
          example: 2500.00
        currency:
          type: string
          example: "USD"
        direction:
          type: string
          enum: [ABOVE, BELOW]
    PriceAlertResponse:
      type: object
      required: [id, symbol, thresholdPrice, currency, direction, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        thresholdPrice:
          type: number
          format: double
        currency:
          type: string
        direction:
          type: string
          enum: [ABOVE, BELOW]
        status:
          type: string
          enum: [ACTIVE, TRIGGERED, CANCELLED]
        createdAt:
          type: string
          format: date-time
        triggeredAt:
          type: string
          format: date-time
          nullable: true
        triggerPrice:
          type: number
          format: double
          nullable: true
    NotificationResponse:
      type: object
      required: [id, type, title, body, read, createdAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [PRICE_ALERT]
        referenceId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        body:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
