openapi: "3.1.0"
info:
  title: Aureon – Auth API
  version: "1.0.0"
  description: Google OAuth2 authentication endpoints.

servers:
  - url: /api/v1

paths:
  /auth/me:
    get:
      summary: Get current authenticated user profile
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      summary: Invalidate current session (client should discard JWT)
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Logged out successfully

# Note: OAuth2 flow initiation and callback are handled by Spring Security:
#   GET  /oauth2/authorization/google   → redirects to Google
#   GET  /login/oauth2/code/google      → Spring Security callback; issues JWT; redirects to SPA

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserProfile:
      type: object
      required: [id, email, displayName, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
