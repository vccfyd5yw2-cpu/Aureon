openapi: "3.1.0"
info:
  title: Aureon – Chat API
  version: "1.0.0"
  description: AI chatbot for gold market analysis. Supports streaming and non-streaming responses.

servers:
  - url: /api/v1

paths:
  /chat/message:
    post:
      summary: Send a message and receive a streaming AI response
      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE stream of response tokens
          content:
            text/event-stream:
              schema:
                type: string
                description: Each event is a partial token string; final event is [DONE]
        "400":
          description: Empty or invalid question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded (max 20 req/min per session)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/history:
    get:
      summary: Retrieve conversation history for a session
      operationId: getChatHistory
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of messages in session order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatHistoryResponse"

components:
  schemas:
    ChatRequest:
      type: object
      required: [sessionId, question]
      properties:
        sessionId:
          type: string
          format: uuid
          description: Client-generated session UUID; persisted in browser localStorage
        question:
          type: string
          minLength: 1
          maxLength: 1000
    ChatMessage:
      type: object
      required: [role, content, timestamp]
      properties:
        role:
          type: string
          enum: [USER, ASSISTANT]
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        dataGrounded:
          type: boolean
          description: True when assistant response was grounded with platform price data
    ChatHistoryResponse:
      type: object
      required: [sessionId, messages]
      properties:
        sessionId:
          type: string
          format: uuid
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
