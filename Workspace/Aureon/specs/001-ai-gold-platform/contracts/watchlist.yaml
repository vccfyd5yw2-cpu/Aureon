openapi: "3.1.0"
info:
  title: Aureon – Watchlist API
  version: "1.0.0"
  description: Authenticated user watchlist management.

servers:
  - url: /api/v1

security:
  - BearerAuth: []

paths:
  /watchlist:
    get:
      summary: List all watchlist items for the current user
      operationId: getWatchlist
      responses:
        "200":
          description: User's watchlist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Add an instrument to the watchlist
      operationId: addToWatchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWatchlistRequest"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistItem"
        "409":
          description: Instrument already in watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /watchlist/{symbol}:
    delete:
      summary: Remove an instrument from the watchlist
      operationId: removeFromWatchlist
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
            example: "XAU/USD"
      responses:
        "204":
          description: Removed successfully
        "404":
          description: Symbol not in watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    WatchlistItem:
      type: object
      required: [id, symbol, createdAt]
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
          example: "XAU/USD"
        label:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    AddWatchlistRequest:
      type: object
      required: [symbol]
      properties:
        symbol:
          type: string
          example: "XAU/USD"
        label:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
